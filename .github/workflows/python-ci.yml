name: Python Docker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 第一步：解決權限問題
    permissions:
      contents: read
      packages: write 

    steps:
      # 第二步：更新套件版本消除 Node.js 警告
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5 消除警告
        with:
          python-version: '3.10'

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 同時支援一般伺服器 (amd64) 和 你的 Mac (arm64)
          platforms: linux/amd64,linux/arm64 
          tags: ghcr.io/ahua199413/my-python-app:latest
        run: |
          # 1. 取得倉庫名稱並轉為小寫 (解決 Docker 命名限制)
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          echo "目標倉庫: $IMAGE_ID"
          
          # 2. 建立映像檔
          docker build -t $IMAGE_ID:latest .
          
          # 3. 強制推送到 GitHub Packages
          docker push $IMAGE_ID:latest