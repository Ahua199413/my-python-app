name: Python Multi-Platform Docker CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 修正警告關鍵 1：安裝模擬器，讓 Linux 能模擬 Mac 的 ARM 架構
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 修正警告關鍵 2：安裝進階版 Docker Build 工具 (Buildx)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 修正語法衝突：直接使用官方 Action 處理多平台打包
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 同時支援一般伺服器 (amd64) 和你的 Mac (arm64)
          platforms: linux/amd64,linux/arm64 
          # 這裡會自動幫你處理大小寫
          tags: ghcr.io/${{ github.repository_owner }}/my-python-app:latest